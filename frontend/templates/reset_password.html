{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 relative overflow-hidden">
    <!-- Background Blob Glows -->
    <div class="absolute top-[10%] left-[20%] w-[300px] h-[300px] rounded-full bg-blue-500/10 blur-[80px] pointer-events-none"></div>
    <div class="absolute bottom-[10%] right-[20%] w-[300px] h-[300px] rounded-full bg-indigo-500/10 blur-[80px] pointer-events-none"></div>

    <div class="w-full max-w-md relative">
        <div class="glass-panel rounded-3xl shadow-xl p-8 sm:p-10 border border-slate-200/50 dark:border-slate-800/50">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold font-outfit text-slate-900 dark:text-white mb-2">Reset Password</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400">Enter the OTP sent to your email and set your new password</p>
            </div>
            
            <form action="{{ url_for('auth.reset_password') }}" method="POST" class="space-y-5">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                
                <!-- OTP Code -->
                <div>
                    <label for="otp" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-455 mb-2">OTP Verification Code</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 pointer-events-none">
                            <i class="fa-solid fa-key"></i>
                        </span>
                        <input type="text" name="otp" id="otp" required maxlength="6"
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 dark:text-slate-100 transition-all text-sm text-center font-bold tracking-widest"
                            placeholder="123456">
                    </div>
                </div>

                <!-- New Password -->
                <div>
                    <label for="new_password" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-455 mb-2">New Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 pointer-events-none">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" name="new_password" id="new_password" required
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 dark:text-slate-100 transition-all text-sm"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="confirm_password" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-455 mb-2">Confirm New Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 pointer-events-none">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" name="confirm_password" id="confirm_password" required
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 dark:text-slate-100 transition-all text-sm"
                            placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" 
                    class="w-full py-3.5 px-4 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm shadow-lg shadow-blue-500/20 hover:shadow-blue-500/35 transition-all flex justify-center items-center space-x-2 mt-2">
                    <span>Reset Password</span>
                    <i class="fa-solid fa-circle-check text-xs"></i>
                </button>
            </form>

            <div class="mt-4">
                <form action="{{ url_for('auth.resend_otp') }}" method="POST">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="w-full text-xs text-slate-500 hover:text-blue-500 font-semibold transition-colors text-center block">
                        Didn't receive code? Resend OTP
                    </button>
                </form>
            </div>

            <div class="mt-8 text-center border-t border-slate-200/50 dark:border-slate-800/40 pt-6">
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    Back to
                    <a href="{{ url_for('auth.login') }}" class="font-semibold text-blue-600 dark:text-blue-400 hover:underline">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
